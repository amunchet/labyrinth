global:
  smtp_smarthost: 'SMARTHOST:25'
  smtp_from: 'MAILFROM'
  smtp_auth_username: 'SMTPUSER'
  smtp_auth_password: 'SMTPPASSWORD'

inhibit_rules:
- equal:
  - alertname
  - dev
  - instance
  source_match:
    severity: critical
  target_match:
    severity: warning

receivers:
- name: dev.mails
  email_configs:
  - to: 'MAILTO'


route:
  group_by:
  - alertname
  # How long to wait before sending the first notification for a new group of alerts.
  # Increase to batch up alerts that fire at the same time (e.g. 1m, 5m).
  group_wait: 30s
  # How long to wait before sending a notification about new alerts added to an
  # already-firing group. Lower values mean faster notification of new issues within
  # an existing incident.
  group_interval: 5m
  receiver: dev.mails
  # How long to wait before re-sending a notification for an alert that is still firing.
  # Set to a longer value (e.g. 4h, 12h, 24h) to avoid repeated alert emails for
  # ongoing known issues. Set shorter (e.g. 1h) if you want frequent reminders.
  repeat_interval: 4h
