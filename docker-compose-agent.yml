version: "3.2"
services:
  backend:
    build:
      context: "backend"
      args:
        TZ: ${TZ}
    restart: always
    volumes:
      - ./backend/:/src
      - ./alertmanager:/alertmanager
      - ./frontend/labyrinth/public:/public
    networks:
      - labyrinth
    environment:
      REDIS_HOST: redis
      PRODUCTION: 1

  frontend:
    build: ./caddy
    restart: always
    networks:
      - labyrinth
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      # Caddy stores runtime state below the XDG homes at /data/caddy and /config/caddy.
      - caddy_data:/data/caddy
      - caddy_config:/config/caddy
      - ./frontend/labyrinth/dist/:/dist:ro
    env_file:
      - caddy/.env
    environment:
      COMPOSE_CONVERT_WINDOWS_PATHS: 1
    healthcheck:
      test: ["CMD-SHELL", "curl -k -f https://localhost/health || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 3
    ports:
      - "443:443"

  # Redis
  redis:
    image: bitnami/redis:latest
    restart: always
    environment:
      ALLOW_EMPTY_PASSWORD: "yes"
    networks:
      - labyrinth
    # volumes:
    #  - ./redis_data:/bitnami/redis/data

networks:
  labyrinth:
    external: true

volumes:
  caddy_data:
  caddy_config:
